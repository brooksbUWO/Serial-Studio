#-------------------------------------------------------------------------------
# Workflow configuration
#-------------------------------------------------------------------------------

name: Build GPL

on:
  push:
    paths-ignore:
    - '**.md'

  pull_request:
    paths-ignore:
    - '**.md'

  workflow_dispatch:

#-------------------------------------------------------------------------------
# Define application name & version
#-------------------------------------------------------------------------------

env:
  VERSION: "3.2.7"
  QT_VERSION_WINDOWS: 6.11.0
  EXECUTABLE: "Serial-Studio"
  APPLICATION: "Serial Studio"
  PUBLISHER: "Alex Spataru"
  INSTALL_QT_WINDOWS: true
  QTFRAMEWORK_BYPASS_LICENSE_CHECK: "true"
  DESCRIPTION: "Multi-purpose serial data visualization & processing program (GPL)"

#-------------------------------------------------------------------------------
# Windows build (MSVC 2022 x86_64)
#-------------------------------------------------------------------------------

jobs:
  build-windows:
    runs-on: windows-latest
    name: 'Windows x64'
    steps:
    - run: git config --global core.autocrlf input
    - name: 'Checkout'
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: 'Restore Qt Cache'
      id: qt-cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_WINDOWS}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_WINDOWS}}-x64-msvc2022_64

    - name: 'Install Qt'
      shell: pwsh
      if: steps.qt-cache.outputs.cache-hit != 'true'
      env:
        QT_VERSION: ${{env.QT_VERSION_WINDOWS}}
        QT_ARCH: x64
        QT_USERNAME: ${{secrets.QT_USERNAME}}
        QT_PASSWORD: ${{secrets.QT_PASSWORD}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_WINDOWS}}-${{runner.os}}-x64
      run: |
        ./scripts/install-qt.ps1

    - name: 'Save Qt Cache'
      if: steps.qt-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_WINDOWS}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_WINDOWS}}-x64-msvc2022_64

    - name: 'Add Qt to PATH'
      shell: pwsh
      env:
        QT_VERSION: ${{env.QT_VERSION_WINDOWS}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_WINDOWS}}-${{runner.os}}-x64
      run: |
        $QT_BIN_PATH = "$env:QT_OUTPUT_DIR\$env:QT_VERSION\msvc2022_64\bin"
        $QT_LIBEXEC_PATH = "$env:QT_OUTPUT_DIR\$env:QT_VERSION\msvc2022_64\libexec"
        $CMAKE_PREFIX_PATH = "$env:QT_OUTPUT_DIR\$env:QT_VERSION\msvc2022_64\lib\cmake"

        Write-Output "$QT_BIN_PATH" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        Write-Output "$QT_LIBEXEC_PATH" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        Write-Output "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> $env:GITHUB_ENV

    - name: 'Install CMake'
      uses: lukka/get-cmake@latest
      with:
        useLocalCache: true

    - name: 'Setup MSVC Development Environment'
      uses: TheMrMilchmann/setup-msvc-dev@v4
      with:
        arch: x64

    - name: 'Configure with CMake'
      run: |
        cmake -B build `
          -DCMAKE_CXX_COMPILER=cl `
          -DCMAKE_C_COMPILER=cl `
          -DPRODUCTION_OPTIMIZATION=ON `
          -DENABLE_HARDENING=ON `
          -DENABLE_GRPC=OFF `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_CONFIGURATION_TYPES=Release `
          -DBUILD_COMMERCIAL=OFF `
          -DBUILD_GPL3=ON

    - name: 'Build application'
      run: cmake --build build --config Release -j 16

    - name: 'Create portable TGZ'
      run: |
        cd build
        cpack -G TGZ
        mv *.tar.gz ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.tgz

    - name: 'Extract TGZ contents'
      shell: bash
      run: |
        cd build
        7z x ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.tgz
        7z x ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.tar
        DIRNAME=$(tar -tf ${{env.EXECUTABLE}}-${{env.VERSION}}-Windows.tar 2>/dev/null | head -1 | cut -f1 -d"/" || true)
        echo $DIRNAME > dirname.txt
        cp ../app/deploy/windows/license.rtf ./License.rtf

    - name: 'Create Windows batch launcher'
      shell: bash
      run: |
        cd build
        DIRNAME=$(cat dirname.txt)
        echo "@echo off" > "${{env.APPLICATION}}.bat"
        echo "start \"\" \"%~dp0${DIRNAME}\\bin\\${{env.EXECUTABLE}}.exe\"" >> "${{env.APPLICATION}}.bat"

    - name: 'Add files to ZIP'
      shell: bash
      run: |
        cd build
        DIRNAME=$(cat dirname.txt)
        7z a ${{env.EXECUTABLE}}-${{env.VERSION}}-GPL-Windows-Portable.zip "${{env.APPLICATION}}.bat" License.rtf $DIRNAME/*
        mv ${{env.EXECUTABLE}}-${{env.VERSION}}-GPL-Windows-Portable.zip ..

    - name: 'Upload artifact: Portable ZIP'
      uses: actions/upload-artifact@v5
      with:
       name: ${{env.EXECUTABLE}}-${{env.VERSION}}-GPL-Windows-Portable
       path: ${{env.EXECUTABLE}}-${{env.VERSION}}-GPL-Windows-Portable.zip

#-------------------------------------------------------------------------------
# Create release
#-------------------------------------------------------------------------------

  upload:
    name: 'Create release'
    needs:
      - build-windows

    permissions:
      contents: write

    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.ref_name || 'continuous' }}

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v5

      - name: 'Download artifacts'
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts
          merge-multiple: true

      - name: 'Delete previous release and tag if exists'
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release '$RELEASE_TAG' exists. Deleting..."
            gh release delete "$RELEASE_TAG" --cleanup-tag --yes --repo "$GITHUB_REPOSITORY" || echo "Failed to delete release. Ignoring."
          else
            echo "No release named '$RELEASE_TAG' found. Skipping delete."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Create Release'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          commit: ${{ github.sha }}
          prerelease: false
          allowUpdates: true
          replacesArtifacts: true
          name: 'Serial Studio ${{ env.VERSION }} GPL'
          body: |
            GPL-3.0 build of Serial Studio ${{ env.VERSION }} for Windows x64.

            This build excludes Pro-only features (MQTT, CAN Bus, Modbus, 3D Plot,
            Image View, MDF4, multi-source). All core features are included:
            serial connectivity, JavaScript frame parser, dashboard widgets
            (plots, gauges, FFT, datagrid), CSV export, and project editor.

            Built from source: https://github.com/Serial-Studio/Serial-Studio
          artifacts: |
            artifacts/*.zip
